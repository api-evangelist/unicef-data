aid: unicef-data
name: UNICEF Data
description: >
  UNICEF Data is the official open data platform of the United Nations Children's
  Fund, providing programmatic access to global child welfare statistics, health
  and nutrition indicators, education data, child protection metrics, MICS
  (Multiple Indicator Cluster Survey) results, and SDG indicators for children
  across countries worldwide. The primary API is an SDMX REST web service
  exposing UNICEF's Data Warehouse, which contains 748+ indicators organized into
  thematic dataflows covering demography, maternal and child health, nutrition,
  HIV/AIDS, WASH, education, and gender. All data is freely accessible without
  authentication, licensed under Creative Commons Attribution 3.0 IGO.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/unicef-data/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Children
  - Child Welfare
  - Global Health
  - Statistics
  - SDG
  - MICS
  - Education
  - Nutrition
  - SDMX
  - Open Data
  - United Nations
  - UNICEF
apis:
  - name: UNICEF SDMX Data Warehouse API
    description: >
      The UNICEF SDMX REST API provides programmatic access to UNICEF's Data
      Warehouse Explorer, containing 748+ indicators across thematic dataflows
      covering child health, nutrition, maternal and newborn health, HIV/AIDS,
      WASH, education, child protection, demography, and gender. Data spans all
      UN member states and is drawn from MICS, DHS, national surveys, and
      administrative sources. No authentication or API key is required. Supports
      SDMX-JSON, SDMX-XML (v2.0 and v2.1), and CSV output formats.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://data.unicef.org/sdmx-api-documentation/
    baseURL: https://sdmx.data.unicef.org/ws/public/sdmxapi/rest/
    tags:
      - SDMX
      - Child Health
      - Nutrition
      - Education
      - Child Protection
      - MICS
      - SDG Indicators
      - Open Data
    properties:
      - type: Documentation
        url: https://data.unicef.org/sdmx-api-documentation/
      - type: Explorer
        url: https://sdmx.data.unicef.org/webservice/data.html
      - type: JSONLDContext
        url: json-ld/unicef-sdmx-context.jsonld
  - name: UNICEF Reference Data Manager API
    description: >
      The UNICEF Reference Data Manager (RDM) API provides structured access to
      UNICEF's reference data including geographic hierarchies, organizational
      units, and classification codes used across UNICEF programmes. Documented
      via a Swagger/OpenAPI interface at rdmapi.unicef.org.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://rdmapi.unicef.org/
    baseURL: https://rdmapi.unicef.org/api/
    tags:
      - Reference Data
      - Geographic
      - Classifications
      - Organizational
    properties:
      - type: Documentation
        url: https://rdmapi.unicef.org/api/doc/index.html
      - type: OpenAPI
        url: https://rdmapi.unicef.org/swagger/v1/swagger.json
      - type: OpenAPI
        url: openapi/unicef-reference-data-manager-openapi.json
  - name: UNICEF GeoSight API
    description: >
      GeoSight is UNICEF's geospatial data platform for visualizing and analyzing
      humanitarian and development indicators by geography. The REST API provides
      access to geospatial indicator data layers, context layers, and dashboards.
      Requires Django-based authentication for write operations; read access to
      public datasets is available without credentials.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://geosight.unicef.org/
    baseURL: https://geosight.unicef.org/api/v1/
    tags:
      - Geospatial
      - GIS
      - Humanitarian
      - Indicators
      - Maps
    properties:
      - type: Documentation
        url: https://geosight.unicef.org/en-us/api/v1/docs/
      - type: OpenAPI
        url: https://geosight.unicef.org/en-us/api/v1/docs/?format=openapi
      - type: OpenAPI
        url: openapi/unicef-geosight-openapi.json
